name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch Airtable data
        run: node scripts/fetch-data.js
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}

      # GitHub Pages caches main.js/style.css for 10 min (max-age=600) under their
      # unversioned filenames, so browsers can serve a stale mix right after a deploy.
      # Bust the cache on every deploy by tagging references with the commit SHA.
      - name: Cache-bust CSS/JS references
        run: |
          for f in *.html; do
            sed -i "s/href=\"style\.css\"/href=\"style.css?v=${GITHUB_SHA}\"/g; s/src=\"main\.js\"/src=\"main.js?v=${GITHUB_SHA}\"/g" "$f"
          done

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
