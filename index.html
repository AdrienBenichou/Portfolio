<!DOCTYPE html>
<html lang="fr" data-lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adrien Benichou — Sport &amp; Digital</title>
<meta name="description" content="Portfolio d'Adrien Benichou, étudiant M2 International Sport &amp; Event Management, spécialisé CRM et Community Management.">

<!-- Google Fonts : display face caractérielle + body face lisible -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body data-page="home">

  <!-- Curseur custom (desktop only, géré/affiché en JS) -->
  <div id="custom-cursor" aria-hidden="true"></div>

  <!-- Switcher FR/EN, toujours accessible -->
  <div class="lang-switcher" role="group" aria-label="Changer de langue">
    <button type="button" class="lang-btn is-active" data-lang-btn="fr" aria-pressed="true">FR</button>
    <button type="button" class="lang-btn" data-lang-btn="en" aria-pressed="false">EN</button>
  </div>

  <!-- ============ HERO : cercle-cylindre rotatif, seule navigation de la page d'accueil ============ -->
  <header id="hero" class="hero hero--nav-only">
    <div class="reel-wrapper" id="reel-wrapper" data-reel-mode="nav">
      <div class="reel" id="reel" tabindex="0" role="listbox" aria-label="Navigation principale">
        <div class="reel-track" id="reel-track">
          <!-- slides injectés par main.js depuis les 5 sections du site -->
        </div>
      </div>
      <div class="reel-controls">
        <div class="reel-pill">
          <div class="reel-pill-thumb"><img id="reel-thumb-img" src="" alt=""></div>
          <p class="reel-pill-label" id="reel-label"></p>
          <div class="reel-pill-arrows">
            <button type="button" class="reel-arrow" id="reel-prev" aria-label="Section précédente">&larr;</button>
            <button type="button" class="reel-arrow" id="reel-next" aria-label="Section suivante">&rarr;</button>
          </div>
        </div>
        <button type="button" class="reel-toggle" id="reel-toggle" aria-label="Mettre en pause la rotation" aria-pressed="false">
          <span class="reel-toggle-icon" aria-hidden="true"></span>
        </button>
      </div>
    </div>
  </header>

  <!-- AOS : lib d'animation légère pour les scroll-reveals -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>

  <script src="main.js" defer></script>
</body>
</html>
