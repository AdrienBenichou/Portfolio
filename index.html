<!DOCTYPE html>
<html lang="fr" data-lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adrien Benichou — Sport &amp; Digital</title>
<meta name="description" content="Portfolio d'Adrien Benichou, étudiant M2 International Sport &amp; Event Management, spécialisé CRM et Community Management.">

<!-- Google Fonts : display face caractérielle + body face lisible -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body data-page="home">

  <!-- Curseur custom (desktop only, géré/affiché en JS) -->
  <div id="custom-cursor" aria-hidden="true"></div>

  <!-- Switcher FR/EN, toujours accessible -->
  <div class="lang-switcher" role="group" aria-label="Changer de langue">
    <button type="button" class="lang-btn is-active" data-lang-btn="fr" aria-pressed="true">FR</button>
    <button type="button" class="lang-btn" data-lang-btn="en" aria-pressed="false">EN</button>
  </div>

  <!-- ============ HERO : nom + liste de nav (score) + pile de projets, seule navigation de la page d'accueil ============ -->
  <header id="hero" class="hero hero--split">
    <div class="hero-card" id="hero-card">
      <div class="hero-stickers" aria-hidden="true">
        <img src="assets/sticker-monaco.png" alt="" class="hero-sticker hero-sticker--a" loading="lazy">
        <img src="assets/sticker-cnosf.png" alt="" class="hero-sticker hero-sticker--b" loading="lazy">
      </div>

      <div class="hero-main">
        <p class="hero-name" id="hero-bg-name">Adrien Benichou</p>
        <p class="hero-eyebrow" data-i18n="hero.eyebrow">Sport × Digital</p>

        <div class="hero-nav" id="hero-nav" role="group" aria-label="Navigation principale">
          <div class="hero-nav-bubble" id="hero-nav-bubble" aria-hidden="true"></div>
          <!-- boutons de section injectés par main.js -->
        </div>
      </div>

      <div class="hero-stack-wrap" id="hero-stack-wrap" tabindex="0" role="group" aria-label="Aperçu de la section">
        <div class="hero-stack" id="hero-stack">
          <!-- cartes de preview injectées par main.js -->
        </div>
      </div>

      <a href="projets.html" class="hero-all-cta" id="hero-all-cta" data-i18n="hero.allProjects">Tous mes projets →</a>
    </div>
  </header>

  <!-- AOS : lib d'animation légère pour les scroll-reveals -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>

  <script src="main.js" defer></script>
</body>
</html>
